components:
    schemas:
        c1.api.a2ui.v1.A2UIComponent:
            description: |
                A2UIComponent - typed discriminated union for UI components.
                 Uses oneof for proper TypeScript discrimination.

                This message contains a oneof named component. Only a single field of the following list may be set at a time:
                  - text
                  - textField
                  - checkBox
                  - choicePicker
                  - dateTimeInput
                  - slider
                  - progressBar
                  - button
                  - row
                  - column
                  - card
                  - divider
                  - c1StatusIndicator
                  - c1CodeBlock
                  - c1ResourcePicker
                  - c1DurationPicker
                  - c1TodoList
                  - c1SlackNotifications
                  - c1MsTeamsNotifications
                  - c1ConnectorSyncProgress
                  - c1ConnectorConfigForm
                  - c1OnboardingWelcome
                  - c1OnboardingPlan
                  - c1ConnectorSyncDetail
            properties:
                button:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.ButtonComponent'
                c1CodeBlock:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.C1CodeBlockComponent'
                c1ConnectorConfigForm:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.C1ConnectorConfigFormComponent'
                c1ConnectorSyncDetail:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.C1ConnectorSyncDetailComponent'
                c1ConnectorSyncProgress:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.C1ConnectorSyncProgressComponent'
                c1DurationPicker:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.C1DurationPickerComponent'
                c1MsTeamsNotifications:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.C1MSTeamsNotificationsComponent'
                c1OnboardingPlan:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.C1OnboardingPlanComponent'
                c1OnboardingWelcome:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.C1OnboardingWelcomeComponent'
                c1ResourcePicker:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.C1ResourcePickerComponent'
                c1SlackNotifications:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.C1SlackNotificationsComponent'
                c1StatusIndicator:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.C1StatusIndicatorComponent'
                c1TodoList:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.C1TodoListComponent'
                card:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.CardComponent'
                checkBox:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.CheckBoxComponent'
                choicePicker:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.ChoicePickerComponent'
                column:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.ColumnComponent'
                dateTimeInput:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.DateTimeInputComponent'
                divider:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.DividerComponent'
                id:
                    description: The id field.
                    readOnly: false
                    type: string
                progressBar:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.ProgressBarComponent'
                row:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.RowComponent'
                slider:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.SliderComponent'
                text:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.TextComponent'
                textField:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.TextFieldComponent'
                weight:
                    description: The weight field.
                    format: int32
                    readOnly: false
                    type: integer
            title: A 2 Ui Component
            type: object
            x-speakeasy-name-override: A2UIComponent
        c1.api.a2ui.v1.A2UIServiceCreateSurfaceFeedbackRequestInput:
            description: A2UIServiceCreateSurfaceFeedbackRequest creates feedback for a surface.
            properties:
                conversationId:
                    description: The conversationId field.
                    readOnly: false
                    type: string
                sentiment:
                    description: The sentiment field.
                    enum:
                        - A2UI_SURFACE_FEEDBACK_SENTIMENT_UNSPECIFIED
                        - A2UI_SURFACE_FEEDBACK_SENTIMENT_POSITIVE
                        - A2UI_SURFACE_FEEDBACK_SENTIMENT_NEGATIVE
                    readOnly: false
                    type: string
                    x-speakeasy-unknown-values: allow
                text:
                    description: The text field.
                    readOnly: false
                    type: string
            title: A 2 Ui Service Create Surface Feedback Request
            type: object
            x-speakeasy-name-override: A2UIServiceCreateSurfaceFeedbackRequest
        c1.api.a2ui.v1.A2UIServiceCreateSurfaceFeedbackResponse:
            description: A2UIServiceCreateSurfaceFeedbackResponse returns the created feedback.
            properties:
                feedback:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.A2UISurfaceFeedback'
            title: A 2 Ui Service Create Surface Feedback Response
            type: object
            x-speakeasy-name-override: A2UIServiceCreateSurfaceFeedbackResponse
        c1.api.a2ui.v1.A2UIServiceListSurfaceFeedbackResponse:
            description: A2UIServiceListSurfaceFeedbackResponse returns feedback for a surface.
            properties:
                feedback:
                    description: The feedback field.
                    items:
                        $ref: '#/components/schemas/c1.api.a2ui.v1.A2UISurfaceFeedback'
                    nullable: true
                    readOnly: false
                    type: array
            title: A 2 Ui Service List Surface Feedback Response
            type: object
            x-speakeasy-name-override: A2UIServiceListSurfaceFeedbackResponse
        c1.api.a2ui.v1.A2UIServiceListSurfacesResponse:
            description: A2UIServiceListSurfacesResponse returns active surfaces.
            properties:
                surfaces:
                    description: The surfaces field.
                    items:
                        $ref: '#/components/schemas/c1.api.a2ui.v1.A2UISurface'
                    nullable: true
                    readOnly: false
                    type: array
            title: A 2 Ui Service List Surfaces Response
            type: object
            x-speakeasy-name-override: A2UIServiceListSurfacesResponse
        c1.api.a2ui.v1.A2UIServiceSubmitActionRequestInput:
            description: A2UIServiceSubmitActionRequest submits a user action.
            properties:
                actionName:
                    description: The actionName field.
                    readOnly: false
                    type: string
                clientTimestamp:
                    format: date-time
                    readOnly: false
                    type: string
                context:
                    additionalProperties:
                        type: string
                    description: The context field.
                    readOnly: false
                    type: object
                conversationId:
                    description: The conversationId field.
                    readOnly: false
                    type: string
                dataModelJson:
                    description: The dataModelJson field.
                    readOnly: false
                    type: string
                sourceComponentId:
                    description: The sourceComponentId field.
                    readOnly: false
                    type: string
            title: A 2 Ui Service Submit Action Request
            type: object
            x-speakeasy-name-override: A2UIServiceSubmitActionRequest
        c1.api.a2ui.v1.A2UIServiceSubmitActionResponse:
            description: A2UIServiceSubmitActionResponse returns the result of an action.
            properties:
                accepted:
                    description: The accepted field.
                    readOnly: false
                    type: boolean
                errorMessage:
                    description: The errorMessage field.
                    readOnly: false
                    type: string
            title: A 2 Ui Service Submit Action Response
            type: object
            x-speakeasy-name-override: A2UIServiceSubmitActionResponse
        c1.api.a2ui.v1.A2UISurface:
            description: A2UISurface represents a rendered UI surface within a conversation.
            properties:
                catalogId:
                    description: The catalogId field.
                    readOnly: false
                    type: string
                components:
                    description: The components field.
                    items:
                        $ref: '#/components/schemas/c1.api.a2ui.v1.A2UIComponent'
                    nullable: true
                    readOnly: false
                    type: array
                conversationId:
                    description: The conversationId field.
                    readOnly: false
                    type: string
                createdAt:
                    format: date-time
                    readOnly: false
                    type: string
                dataModelJson:
                    description: The dataModelJson field.
                    readOnly: false
                    type: string
                deletedAt:
                    format: date-time
                    readOnly: false
                    type: string
                schemaVersion:
                    description: The schemaVersion field.
                    format: int64
                    readOnly: false
                    type: string
                sendDataModel:
                    description: The sendDataModel field.
                    readOnly: false
                    type: boolean
                state:
                    description: The state field.
                    enum:
                        - SURFACE_LIFECYCLE_STATE_UNSPECIFIED
                        - SURFACE_LIFECYCLE_STATE_ACTIVE
                        - SURFACE_LIFECYCLE_STATE_COMPLETE
                        - SURFACE_LIFECYCLE_STATE_DELETED
                    readOnly: false
                    type: string
                    x-speakeasy-unknown-values: allow
                surfaceId:
                    description: The surfaceId field.
                    readOnly: false
                    type: string
                tenantId:
                    description: The tenantId field.
                    readOnly: false
                    type: string
                updatedAt:
                    format: date-time
                    readOnly: false
                    type: string
            title: A 2 Ui Surface
            type: object
            x-speakeasy-name-override: A2UISurface
        c1.api.a2ui.v1.A2UISurfaceFeedback:
            description: A2UISurfaceFeedback represents user feedback for a surface.
            properties:
                actionName:
                    description: The actionName field.
                    readOnly: false
                    type: string
                componentsSnapshot:
                    description: The componentsSnapshot field.
                    readOnly: false
                    type: string
                conversationId:
                    description: The conversationId field.
                    readOnly: false
                    type: string
                createdAt:
                    format: date-time
                    readOnly: false
                    type: string
                dataModelSnapshot:
                    description: The dataModelSnapshot field.
                    readOnly: false
                    type: string
                id:
                    description: The id field.
                    readOnly: false
                    type: string
                schemaVersion:
                    description: The schemaVersion field.
                    format: int64
                    readOnly: false
                    type: string
                sentiment:
                    description: The sentiment field.
                    enum:
                        - A2UI_SURFACE_FEEDBACK_SENTIMENT_UNSPECIFIED
                        - A2UI_SURFACE_FEEDBACK_SENTIMENT_POSITIVE
                        - A2UI_SURFACE_FEEDBACK_SENTIMENT_NEGATIVE
                    readOnly: false
                    type: string
                    x-speakeasy-unknown-values: allow
                surfaceId:
                    description: The surfaceId field.
                    readOnly: false
                    type: string
                text:
                    description: The text field.
                    readOnly: false
                    type: string
            title: A 2 Ui Surface Feedback
            type: object
            x-speakeasy-name-override: A2UISurfaceFeedback
        c1.api.a2ui.v1.Action:
            description: |
                Action represents what happens when a component is activated (e.g., button click).

                This message contains a oneof named action_type. Only a single field of the following list may be set at a time:
                  - event
                  - functionCall
            properties:
                event:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.ServerEvent'
                functionCall:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.FunctionCall'
            title: Action
            type: object
            x-speakeasy-name-override: A2UIAction
        c1.api.a2ui.v1.AndCheck:
            description: AndCheck requires all checks to pass.
            nullable: true
            properties:
                checks:
                    description: The checks field.
                    items:
                        $ref: '#/components/schemas/c1.api.a2ui.v1.ValidationCheck'
                    nullable: true
                    readOnly: false
                    type: array
            title: And Check
            type: object
            x-speakeasy-name-override: AndCheck
        c1.api.a2ui.v1.ButtonComponent:
            description: ButtonComponent triggers actions.
            nullable: true
            properties:
                action:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.Action'
                checks:
                    description: The checks field.
                    items:
                        $ref: '#/components/schemas/c1.api.a2ui.v1.ValidationCheck'
                    nullable: true
                    readOnly: false
                    type: array
                disabled:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.DynamicBool'
                label:
                    $ref: '#/components/schemas/c1.api.a2ui.v1.DynamicString'
                variant:
                    description: The variant field.
                    enum:
